name: Generate and test
on:
  pull_request:
    branches:
      - main
    paths:
      - "pkg/**"
      - "typescript/models/**"
      - go.mod
jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Build
        run: go build ./pkg/...
      #TODO: Check if generator needs to be run, fail if the generator generates new files
      - name: run generator
        run: |
          echo running generator...
          go run cmd/generator/main.go
          git diff --exit-code --numstat pkg/
          if [ $? -ne 0 ]; then
            echo "Generator generated new files, please run the generator locally and commit the changes"
            exit 1
          fi
      - name: Test
        run: |
          echo testing...
          go get -t ./...
          go vet ./...
          go test -v ./...
  build-typescript-models:
    defaults:
      run:
        working-directory: ./typescript/models
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Test
        run: npm run build
